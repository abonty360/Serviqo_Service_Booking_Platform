name: Laravel CI

on:
  push:
    branches:
      - main
      - 25-docker-implementation
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup environment
        run: |
          cp .env.example .env || true

          echo "APP_ENV=testing" >> .env
          echo "APP_DEBUG=true" >> .env

          echo "DB_CONNECTION=sqlsrv" >> .env
          echo "DB_HOST=mssql" >> .env
          echo "DB_PORT=1433" >> .env
          echo "DB_DATABASE=serviqo_s_df" >> .env
          echo "DB_USERNAME=sa" >> .env
          echo "DB_PASSWORD=StrongPass!123" >> .env

      - name: Build containers
        run: docker compose build

      - name: Start containers
        run: docker compose up -d

      - name: Wait for services
        run: sleep 35

      - name: Install dependencies
        run: docker compose exec -T app composer install

      - name: Generate app key
        run: docker compose exec -T app php artisan key:generate

      - name: Clear config
        run: docker compose exec -T app php artisan config:clear

      - name: Laravel sanity check
        run: docker compose exec -T app php artisan --version
        
      - name: Check DB connection
        run: docker compose exec -T app php artisan tinker --execute="DB::connection()->getPdo(); echo 'DB OK';"